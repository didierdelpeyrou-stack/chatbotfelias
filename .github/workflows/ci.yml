# CI du chatbot ELISFA (fix 13).
#
# Déclenche pytest + ruff sur chaque push et chaque PR vers main, pour :
#   - garantir qu'aucune régression n'atteint la prod,
#   - rendre visibles les tests qui cassent avant le merge.
#
# Secrets requis dans Settings → Secrets and variables → Actions :
#   - aucun (tests = stubbés, pas de vrai appel Anthropic)
#
# Variables d'env définies directement dans le job :
#   - ANTHROPIC_API_KEY=test-key-not-real (conftest le remplace de toute façon)
#   - CLAUDE_MODEL=claude-haiku-4-5-20251001
#
# Durée typique : 1–2 min (install deps + tests unittest + integration).

name: CI

on:
  push:
    branches: [main, v2-dev]
  pull_request:
    branches: [main, v2-dev]

jobs:
  # ══════════════════════════════════════════════
  #                    TESTS
  # ══════════════════════════════════════════════
  tests:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      # Variables d'env minimales pour que app.py démarre.
      # conftest.py override le comportement réel d'Anthropic, ces valeurs
      # ne partent jamais sur le réseau.
      ANTHROPIC_API_KEY: test-key-not-real
      CLAUDE_MODEL: claude-haiku-4-5-20251001
      RATE_LIMIT_PER_MINUTE: "10000"
      RATE_LIMIT_PER_HOUR: "100000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show installed versions
        run: |
          python --version
          pip list | head -30

      - name: Run pytest (V1)
        run: |
          pytest tests/ --tb=short --durations=10

      - name: Run pytest (V2)
        # Sprint 2.1+ : V2 cohabite dans v2/ sur la branche v2-dev.
        # On lance ses tests dans son propre PYTHONPATH.
        run: |
          cd v2 && PYTHONPATH=. pytest tests/ --tb=short

      - name: Upload coverage artifacts (facultatif)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-logs-${{ matrix.python-version }}
          path: |
            .pytest_cache/
            logs/
          retention-days: 7
          if-no-files-found: ignore

  # ══════════════════════════════════════════════
  #                    LINT (ruff)
  # ══════════════════════════════════════════════
  lint:
    name: ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        # Config centralisée dans pyproject.toml (select, ignore, per-file-ignores).
        # Ne JAMAIS passer --select/--ignore ici : les flags CLI override totalement
        # le pyproject.toml, donc nos per-file-ignores pour app.py legacy seraient
        # ignorés. Pour ajouter une règle, éditer pyproject.toml.
        run: ruff check .

  # ══════════════════════════════════════════════
  #                Docker build (smoke)
  # ══════════════════════════════════════════════
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    # On ne build l'image que si tests+lint passent, sur push vers main ou v2-dev
    # (pour ne pas brûler des minutes CI sur chaque PR intermédiaire).
    needs: [tests, lint]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/v2-dev')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build V1 image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: chatbot-elisfa:ci
          cache-from: type=gha,scope=v1
          cache-to: type=gha,mode=max,scope=v1

      - name: Build V2 image (Sprint 3.4 — no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: v2/docker/Dockerfile
          push: false
          tags: chatbot-elisfa-v2:ci
          cache-from: type=gha,scope=v2
          cache-to: type=gha,mode=max,scope=v2
