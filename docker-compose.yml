version: '3.8'

services:
  chatbot:
    build: .
    container_name: elisfa-chatbot
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./fiches_pratiques:/app/fiches_pratiques:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

