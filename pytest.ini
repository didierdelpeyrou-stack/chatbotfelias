[pytest]
# Découverte : garde la compat avec les TestCase unittest déjà écrits.
# pytest sait exécuter unittest.TestCase nativement sans conversion.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Marqueurs pour séparer les catégories — permet de lancer seulement
# les tests rapides en dev, et la totalité en CI.
markers =
    unit: tests unitaires rapides (< 1 s chacun), pas de réseau/disk
    integration: tests d'intégration avec le client Flask mocké (Anthropic stubbé)
    e2e: tests end-to-end qui frappent un serveur réel (nécessitent LIVE_URL)
    slow: tests > 5 s (données volumineuses, RAG, etc.)

# Format de sortie : verbose + couleur + temps total.
addopts = -v --tb=short --color=yes --durations=10

# Filtrer les warnings tiers connus (pydantic v2, anthropic, etc.) pour
# que l'output reste lisible. Ne pas filtrer nos propres warnings.
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:urllib3.*
    ignore::PendingDeprecationWarning
