# Sprint 4.4 — Reverse proxy nginx pour V2 staging.
#
# À copier sur le VPS dans /etc/nginx/sites-available/v2-staging.conf
# puis activer via : ln -s ../sites-available/v2-staging.conf /etc/nginx/sites-enabled/
# Reload nginx : sudo nginx -t && sudo systemctl reload nginx
#
# Pré-requis : DuckDNS sous-domaine `felias-reseau-eli2026-v2` qui pointe sur l'IP du VPS.
# Le bloc HTTPS sera complété automatiquement par certbot (cf. v2/STAGING.md §3).

# ─────────────────────────────────────────────────────────────
# HTTP → HTTPS redirect (Let's Encrypt rend ce bloc nécessaire
# pour le challenge HTTP-01, certbot le réécrit ensuite)
# ─────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name felias-reseau-eli2026-v2.duckdns.org;

    # Pour le challenge ACME (Let's Encrypt). Sans ça, certbot --nginx ne marche pas.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Tout le reste → 301 vers HTTPS (certbot patchera automatiquement)
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────
# HTTPS — proxy vers FastAPI V2 sur 127.0.0.1:8000
# ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name felias-reseau-eli2026-v2.duckdns.org;

    # Certificats — certbot les ajoute après `certbot --nginx -d felias-reseau-eli2026-v2.duckdns.org`
    # ssl_certificate /etc/letsencrypt/live/felias-reseau-eli2026-v2.duckdns.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/felias-reseau-eli2026-v2.duckdns.org/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Sécurité de base — utile même en staging
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # En staging on bloque les robots
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Limites raisonnables (FastAPI prend déjà max_length sur les payloads)
    client_max_body_size 1m;

    # Logs séparés du V1 pour analyse indépendante
    access_log /var/log/nginx/v2-staging.access.log;
    error_log  /var/log/nginx/v2-staging.error.log warn;

    # ─── Proxy principal ───
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts adaptés à Claude (peut prendre 10-15s pour une longue réponse)
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ─── Streaming SSE (/api/ask/stream) ───
    # Nginx bufferise par défaut → casse le streaming. Désactiver explicitement.
    location /api/ask/stream {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming SSE — anti-bufferisation (sans ça, le client reçoit la réponse en bloc)
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 120s;  # plus long pour un stream complet
    }

    # ─── /metrics : restreint à l'IP du VPS pour Prometheus scraping interne ───
    # Si tu n'as pas encore de Prometheus séparé, garde ce bloc commenté.
    # location /metrics {
    #     allow 127.0.0.1;
    #     deny  all;
    #     proxy_pass http://127.0.0.1:8000/metrics;
    # }
}
